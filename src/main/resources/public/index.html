<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>API Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        header {
            padding: 16px 24px;
            background: #020617;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            display: flex;
            height: calc(100vh - 64px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #020617;
            color: #e5e7eb;
            overflow-y: auto;
            padding: 16px 0;
        }

        .sidebar h3 {
            padding: 0 20px 10px;
            font-size: 14px;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .provider-div {
            padding: 0 20px 16px;
        }

        .provider-div select {
            width:100%;
            padding:8px;
            border-radius:4px;
        }

        .endpoint {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .endpoint:hover {
            background: #1e293b;
        }

        .endpoint.active {
            background: #1e293b;
            border-left: 3px solid #38bdf8;
        }

        .method {
            font-weight: bold;
            margin-right: 8px;
        }

        .GET { color: #22c55e; }
        .POST { color: #3b82f6; }
        .PUT { color: #eab308; }
        .DELETE { color: #ef4444; }

        /* Content */
        .content {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .endpoint-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .endpoint-url {
            background: #020617;
            color: #e5e7eb;
            padding: 10px 14px;
            border-radius: 6px;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section h4 {
            margin-bottom: 8px;
        }

        pre {
            background: #020617;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        th {
            background: #f1f5f9;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 220px;
            }
        }
    </style>
</head>
<body>

<header>
    Dynamic Energy Prices
</header>

<div class="container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <h3>Providers</h3>
        <div class="provider-div">
            <select id="providers">
                <option disabled selected value> -- select an option -- </option>
            </select>
        </div>
        <h3>Endpoints</h3>
        <div id="endpoint-div">

        </div>
    </aside>

    <!-- Content -->
    <main class="content" id="content">
        <p>Select an endpoint from the left to view documentation.</p>
    </main>
</div>

<script>
    let apiDocs;
    const providers = document.getElementById('providers');
    const content = document.getElementById('content');

    fetch('providers.json')
        .then(response => response.json())
        .then(data => {
            data.forEach((provider) => {
                const option = document.createElement('option');
                option.value = provider.value;
                option.innerHTML = provider.name;
                option.onclick = () => fetchProviderEndpoints();
                providers.appendChild(option);
            })
        });

    function fetchProviderEndpoints() {
        document.getElementById('endpoint-div').innerHTML = '';
        let provider = '';
        if(providers.value !== 'creg') {
            provider = 'prices.json'
        } else {
            provider = 'creg.json'
        }

        const endpointDiv = document.getElementById('endpoint-div');
        fetch(provider)
            .then(response => response.json())
            .then(data => {
                apiDocs = data;
                data.forEach((endpoint, index) => {
                    const div = document.createElement('div');
                    div.className = 'endpoint';
                    div.innerHTML = `<span class="method ${endpoint.method}">${endpoint.method}</span>${endpoint.path}`;
                    div.onclick = () => selectEndpoint(index, div);
                    endpointDiv.appendChild(div);
                });
            });
    }

    function selectEndpoint(index, element) {
        const selectedProvider = providers.value;
        const e = apiDocs[index];

        fetch(selectedProvider + e.path)
            .then(response => response.json())
            .then(data => {

                document.querySelectorAll('.endpoint').forEach(e => e.classList.remove('active'));
                element.classList.add('active');

                content.innerHTML = `
                  <div class="endpoint-title">${e.name}</div>
                  <div class="endpoint-url"><span class="method ${e.method}">${e.method}</span> ${selectedProvider}${e.path}</div>

                  <div class="section">
                    <h4>Description</h4>
                    <p>${e.description}</p>
                  </div>

                  <div class="section">
                    <h4>Parameters</h4>
                    ${e.params.length ? `
                      <table>
                        <tr><th>Name</th><th>Type</th><th>Description</th></tr>
                        ${e.params.map(p => `<tr><td>${p.name}</td><td>${p.type}</td><td>${p.description}</td></tr>`).join('')}
                      </table>
                    ` : '<p>No parameters</p>'}
                  </div>

                  <div class="section">
                    <h4>Example Response</h4>
                    <pre>${JSON.stringify(e.response, null, 2)}</pre>
                  </div>
                  <div class="section">
                    <h4>Realtime Response</h4>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                  </div>
                `;
            })
    }
</script>

</body>
</html>
